<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: black;
        }
        .container{

            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
            grid-auto-rows: 200px;   
            color: aliceblue;
            justify-content: center;
            position: relative;
            left:300px;
            top : 50px;
            gap:10px;
            width: 43%;
            height: 80vh;
        }
        .one{
            
            background-color: rgb(173, 160, 186);
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 1;
            grid-row-end: 5;
            order: 1;
        }
        .two{
           background-color: rgb(145, 142, 148);
           grid-column-start: 3;
            grid-column-end: 7;
            grid-row-start: 1;
            grid-row-end: 4;
            order: 2;
           
            
        }
        .three{
            
            
            background-color: rgb(152, 209, 152);
            grid-column-start: 7;
            grid-column-end: 9;
            grid-row-start: 1;
            grid-row-end: 6;
        }
        .four{
            
            background-color: rgb(227, 227, 143);
            background-color: rgb(152, 209, 152);
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 5;
            grid-row-end: 9;
        }
        .five{
            background-color: rgb(177, 227, 227);
            grid-column-start: 3;
            grid-column-end: 5;
            grid-row-start: 4;
            grid-row-end: 6;
            
        }
        .six{
            background-color: rgb(195, 121, 121);
            grid-column-start: 5;
            grid-column-end: 7;
            grid-row-start: 4;
            grid-row-end: 6;
        }
        .seven{
            background-color: rgb(160, 160, 83);
            grid-column-start: 3;
            grid-column-end: 5;
            grid-row-start: 6;
            grid-row-end: 9;
            
        }
        .eight{
            background-color: rgb(170, 170, 255);
            grid-column-start: 5;
            grid-column-end: 9;
            grid-row-start: 6;
            grid-row-end: 9;
            
            
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="box one">       
            1
         </div>
        <div class="box two">
            2
        </div>
        <div class="box three">
            3
        </div>
        <div class="box four">
            4
        </div>
        <div class="box five">
            5
        </div>
        <div class="box six">
            6
        </div>
        <div class="box seven">
            7
        </div>
        <div class="box eight">
            8
        </div>
        
        
        

    </div>
</body>
</html>
