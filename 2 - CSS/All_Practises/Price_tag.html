<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: rgb(241, 231, 231);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            width: 90%;
            gap: 12px;
            max-width: 900px;

        }

        .card {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
        }

        .btn {
            background-color: orangered;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="cards">
            <div class="card">
                <p>Basic</p>
                <h1>$11.99/month</h1>
                <div class="column">
                    <p>✅10GB Storage</p>
                    <p>✅ 1 User</p>
                    <p>🚫 Support</p>
                    <button class="btn">Sign Up</button>
                </div>
            </div>
            <div class="card">
                <p>Standard</p>
                <h1>$19.99/month</h1>
                <div class="column">
                    <p>✅50GB Storage</p>
                    <p>✅ 5 User</p>
                    <p>🚫 Phone & Email Support</p>
                    <button class="btn">Sign Up</button>
                </div>
            </div>
            <div class="card">
                <p>Premium</p>
                <h1>$49.99/month</h1>
                <div class="column">
                    <p>✅100GB Storage</p>
                    <p>✅ 10 User</p>
                    <p>🚫 24/7Support</p>
                    <button class="btn">Sign Up</button>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
