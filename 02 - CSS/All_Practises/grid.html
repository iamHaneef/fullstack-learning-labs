<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 1fr 2fr;
            grid-template-rows: 1fr 2fr;
            grid-auto-rows: 200px;
            
            
            color: aliceblue;

            background-color: blue;
            width: 50%;
            

        }
        .one{
            width: 100px;
            height: 100px;
        }
        .two{
           background-color: rebeccapurple;
            
        }
        .three{
            
            
            background-color: green;
        }
        .four{
            
            background-color: yellow;
        }
        .five{
            background-color: aqua;
        }
        .six{
            background-color: brown;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="box one">
            1
        </div>
        <div class="box two">
            2
        </div>
        <div class="box three">
            3
        </div>
        <div class="box four">
            4
        </div>
        <div class="box five">
            5
        </div>
        <div class="box six">
            6
        </div>
        

    </div>
</body>
</html>
