<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=border-width,initial-scale=1.0" >
    <title>Document</title>
    <style>
        .container{
            padding-bottom: 20px;
            border: 10px solid purple;
            background-color: blue;
        }
        .first{
            position: relative;
            top : 15px;
            left : 15px;
            width: 98%;
        }
        .first #white{
            
            background-color: red;
            padding: 10px;
        }
        .second{
            position: relative;
            top : 25px;
            left : 15px;
            width: 98%;
        }
        .second #white{
            background-color: red;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class = first>
            <p>Yellow Text</p>
            <p id="white">White Text</p>
        </div>

        <div class="second">
            <p>Yellow Text</p>
            <p id="white">White Text</p>
        </div>
        
    </div>
</body>
</html>
