<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>layout</title>
    <style>
        body {
            font-family: sans-serif;

        }

        .space {
            
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="space col-md-6 col-sm-12 " style="background-color: red;">50% Desktop , 100% mobile</div>
            <div class="space col-md-6 col-sm-12" style="background-color: rgb(236, 192, 192);">50% Desktop , 100% mobile</div>
        </div>

        <br>

        <div class="row">
            <div class="space col-lg-6 col-sm-12 col-10 " style="background-color: red;">50% Desktop , 100% mobile</div>
            <div class="space col-lg-3 col-sm-6 col-10" style="background-color: rgb(236, 192, 192);">50% Desktop , 100% mobile</div>
             <div class="space col-lg-3 col-sm-6 col-10" style="background-color: rgb(53, 23, 23);">50% Desktop , 100% mobile</div>
        </div>

        <br>

        <div class="row">
            <div class="space col-lg-1 col-md-4 col-sm-6 col-12 " style="background-color: red;">50% Desktop , 100% mobile</div>
            <div class="space col-lg-11 col-md-8 col-sm-6 col-12" style="background-color: rgb(236, 192, 192);">50% Desktop , 100% mobile</div>        
        </div>
    </div>

</body>

</html>
